version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: lurksquad-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: lurksquad
      POSTGRES_PASSWORD: lurksquad
      POSTGRES_DB: lurksquad
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pgdata:
